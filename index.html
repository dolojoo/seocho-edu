const ALL_COURSES = [...COURSES_7, ...COURSES_8];

const state = { district:'', isEligible:false, interest:'', level:0, answers:[] };

function starsHtml(n) {
  let s = '';
  for(let i=0;i<4;i++) s += `<span class="star">${i<n?'★':'☆'}</span>`;
  return s;
}

function renderCard(c) {
  return `<div class="course-card">
    <div class="c-title"><i class="ti ti-book-2" aria-hidden="true" style="font-size:14px;color:var(--blue)"></i>${c.name}</div>
    <div class="course-meta">${starsHtml(c.stars)} ${c.category} &nbsp;·&nbsp; ${c.when} &nbsp;·&nbsp; ${c.time}</div>
    <div>${c.tags.map(t=>`<span class="course-badge">${t}</span>`).join('')}</div>
    <div class="course-desc">${c.desc}</div>
  </div>`;
}

function addBot(html, delay=300) {
  return new Promise(res => {
    const chat = document.getElementById('chat');
    const typing = document.createElement('div');
    typing.className = 'bot-row';
    typing.innerHTML = `<div class="bot-avatar"><i class="ti ti-robot" aria-hidden="true"></i></div><div class="bubble bot typing"><span></span><span></span><span></span></div>`;
    chat.appendChild(typing);
    typing.scrollIntoView({behavior:'smooth',block:'nearest'});
    setTimeout(()=>{
      chat.removeChild(typing);
      const row = document.createElement('div');
      row.className = 'bot-row';
      row.innerHTML = `<div class="bot-avatar"><i class="ti ti-robot" aria-hidden="true"></i></div><div class="bubble bot">${html}</div>`;
      chat.appendChild(row);
      row.scrollIntoView({behavior:'smooth',block:'nearest'});
      res();
    }, delay);
  });
}

function addUser(text) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'user-row';
  row.innerHTML = `<div class="bubble user">${text}</div>`;
  chat.appendChild(row);
  row.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function clearControls() {
  ['opts','inp'].forEach(id => { const el = document.getElementById(id); if(el) el.remove(); });
}

function addOptions(opts, onSelect) {
  clearControls();
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'options-row';
  row.id = 'opts';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = o;
    b.onclick = () => { clearControls(); onSelect(o); };
    row.appendChild(b);
  });
  chat.appendChild(row);
  row.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function addInput(placeholder, onSubmit) {
  clearControls();
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'input-row';
  row.id = 'inp';
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = placeholder;
  const btn = document.createElement('button');
  btn.textContent = '확인';
  btn.onclick = () => { const v = input.value.trim(); if(!v) return; clearControls(); onSubmit(v); };
  input.onkeydown = e => { if(e.key==='Enter') btn.click(); };
  row.appendChild(input); row.appendChild(btn);
  chat.appendChild(row);
  input.focus();
  row.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function step0() {
  await addBot('안녕하세요! 서초 스마트 에듀센터 강좌 추천 도우미입니다 😊<br>먼저 거주하시는 구청을 알려주세요. <span style="color:var(--text-secondary);font-size:13px">(예: 서초구, 강남구, 동작구 등)</span>');
  addInput('거주 구청 입력 (예: 서초구)', async (v) => {
    addUser(v + '에 거주하시는군요.');
    state.district = v;
    const isSeocho = v.replace(/\s/g,'').includes('서초');
    if (isSeocho) {
      state.isEligible = true;
      await addBot(`<strong>서초구민</strong>이시군요! ✅ 수강료가 <strong>무료</strong>입니다.<br>어떤 분야를 배우고 싶으신가요?`);
      step2();
    } else {
      await addBot(`${v}에 거주하시는군요. 서초 관내에 직장 또는 사업장이 있으신가요?`);
      addOptions(['네, 서초구에 직장/사업장 있음','아니오, 없음'], async (ans) => {
        addUser(ans);
        if (ans.includes('네')) {
          state.isEligible = true;
          await addBot(`서초 관내 직장/사업자이시군요! ✅ 수강료가 <strong>무료</strong>입니다.<br>어떤 분야를 배우고 싶으신가요?`);
          step2();
        } else {
          await addBot(`아쉽지만 현재 서초구민 및 서초 관내 직장인·사업자만 수강 신청이 가능합니다.<br>더 궁금한 점이 있으시면 콜센터로 문의해 주세요.`);
          document.getElementById('hotline').style.display = 'flex';
          document.getElementById('resetBtn').style.display = 'flex';
        }
      });
    }
  });
}

    addUser(ans + ' 분야에 관심 있으시군요!');
    state.interest = ans;
    step3();
  });
}

async function step3() {
  const interest = state.interest;

  if (interest.includes('스마트폰')) {
    q = '스마트폰을 얼마나 사용하고 계신가요?';
    opts = ['전원/전화만 간신히','카톡·사진 가능','앱 설치·검색 자유롭게','거의 다 할 수 있음'];
  } else if (interest.includes('자격증')) {
    q = '컴퓨터 프로그램(한글/엑셀 등) 사용 경험이 어느 정도인가요?';
    opts = ['거의 처음','기초 타이핑 가능','문서 작성 경험 있음','함수·편집 어느 정도 가능'];
  } else if (interest.includes('AI') || interest.includes('ChatGPT')) {
    q = 'AI 서비스(ChatGPT, 제미나이 등)를 사용해 보신 적 있나요?';
    opts = ['들어봤지만 써본 적 없음','한두 번 써봤음','자주 사용함','업무에도 활용 중'];
  } else if (interest.includes('영상')) {
    q = '영상 편집 경험이 어느 정도인가요?';
    opts = ['편집 앱 처음','간단한 자르기 가능','자막·효과 적용 가능','자유롭게 편집 가능'];
  } else if (interest.includes('유튜브') || interest.includes('블로그')) {
    q = '채널이나 블로그를 운영해 보신 적 있나요?';
    opts = ['전혀 없음','계정은 있는데 글 안 씀','가끔 포스팅함','꾸준히 운영 중'];
  } else {
    q = '컴퓨터 사용이 어느 정도 익숙하신가요?';
    opts = ['거의 처음','인터넷 검색 정도','문서 작성 가능','엑셀/업무 활용 가능'];
  }
  await addBot(q);
  addOptions(opts, async (ans) => {
    addUser(ans);
    state.level = opts.indexOf(ans);
    state.answers.push(ans);
    step4();
  });
}

async function step4() {
  const interest = state.interest;
  let q2, opts2;
  if (interest.includes('AI') || interest.includes('ChatGPT')) {
    q2 = 'AI로 주로 하고 싶은 것이 무엇인가요?';
    opts2 = ['일상 검색·요약·글쓰기','이미지·영상 만들기','업무 자동화·문서 작성','유튜브·블로그 콘텐츠 제작','✏️ 기타 (직접 입력)'];
  } else if (interest.includes('컴퓨터')) {
    q2 = '컴퓨터로 주로 하고 싶은 것은?';
    opts2 = ['한글/워드 문서 작성','엑셀 표·데이터 관리','파워포인트 발표 자료','기타 사무 활용','✏️ 기타 (직접 입력)'];
  } else if (interest.includes('영상')) {
    q2 = '주로 어떤 기기로 영상을 만들고 싶으신가요?';
    opts2 = ['스마트폰','컴퓨터','둘 다','✏️ 기타 (직접 입력)'];
  } else {
    q2 = '수업 시간대는 언제가 편하신가요?';
    opts2 = ['오전 (09:30~12:00)','오후 (13:00~15:30)','늦은 오후 (15:40~18:10)','저녁 (18:30~21:00)','✏️ 기타 (직접 입력)'];
  }
  await addBot(q2);
  addOptions(opts2, async (ans) => {
    if (ans.includes('기타')) {
      await addBot('어떤 내용을 배우고 싶으신지 자유롭게 적어주세요 😊');
      addInput('배우고 싶은 내용을 입력해 주세요', async (text) => {
        addUser(text);
        state.answers.push(text);
        recommend();
      });
    } else {
      addUser(ans);
      state.answers.push(ans);
      recommend();
    }
  });
}
